<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><b><i>RoutineOS</i></b></title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<img src="https://www.freepik.com/vectors/economics" alt="Description of the image">
    <header>
        <h1><b><i>RoutineOS</i></b></h1>
    </header>

    <section class="add-section">
        <input type="text" id="habitInput" placeholder="Enter a habit...">
        <button id="addHabitBtn">Add Habit</button>
    </section>

    <section class="habits-section">
        <h2>Your Habits</h2>
        <div id="habitsContainer" class="habits-container"></div>
    </section>

    <button id="resetBtn" class="reset-btn">Reset Today’s Progress</button>

    <script src="script.js"></script>
</body>
</html>
